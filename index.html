<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiXXiE Soul Resonance - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;800;900&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { 
            --primary-fairy: #d4a5ff; 
            --bg-dark: #0a0b10; 
            --card-w: 320px; 
            --card-h: 520px; 
            --border-width: 2px;
        }
        
        * { 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; -webkit-user-drag: none; 
            outline: none; -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
        }
        
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Montserrat', 'Prompt', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; width: 100vw;
            overflow: hidden; touch-action: none; overscroll-behavior: none; 
        }

        body::after { 
            content: ''; position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 50%, rgba(212, 165, 255, 0.08) 0%, transparent 80%); 
            z-index: 0; pointer-events: none; 
        }
        
        @keyframes fairyIn { 
            0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(10px); } 
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
        }
        
        .animate-item { opacity: 0; animation: fairyIn 1s cubic-bezier(0.15, 0.85, 0.35, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; } 
        .delay-2 { animation-delay: 0.4s; }
        
        #intro-screen { text-align: center; z-index: 10; width: 100%; position: relative; display: block; }
        
        .main-title { 
            font-size: 2.8rem; font-weight: 200; letter-spacing: 12px; 
            background: linear-gradient(to bottom, #fff, var(--primary-fairy)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; text-transform: uppercase; 
        }
        
        .sub-title { font-size: 0.7rem; letter-spacing: 5px; color: rgba(255,255,255,0.4); margin-bottom: 60px; }
        
        /* 多層次聲波環佈局 */
        .orb-container { 
            position: relative; width: 280px; height: 280px; 
            margin: 0 auto; display: flex; align-items: center; justify-content: center; 
        }
        
        .mic-wave { 
            position: absolute; border-radius: 50%; border: 1px solid var(--primary-fairy); 
            opacity: 0; pointer-events: none; 
            transition: transform 0.1s ease-out, opacity 0.2s; 
        }
        .w1 { width: 120px; height: 120px; border-width: 2px; z-index: 4; }
        .w2 { width: 160px; height: 160px; border-width: 1px; opacity: 0.4; z-index: 3; }
        .w3 { width: 210px; height: 210px; border-width: 0.5px; border-style: dashed; z-index: 2; }
        .w4 { width: 260px; height: 260px; border-width: 8px; filter: blur(15px); opacity: 0; z-index: 1; }

        @keyframes breathe { 
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212, 165, 255, 0.1), inset 0 0 20px rgba(255,255,255,0.1); } 
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 165, 255, 0.3), inset 0 0 30px rgba(255,255,255,0.2); } 
        }
        
        .soul-orb { 
            width: 120px; height: 120px; border-radius: 50%; 
            background: rgba(212, 165, 255, 0.12); border: 1px solid rgba(212, 165, 255, 0.4); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            cursor: pointer; position: relative; z-index: 5; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; justify-content: center; 
            animation: breathe 3s ease-in-out infinite; 
        }
        .soul-orb.recording { animation: none; transform: scale(0.9); background: rgba(212, 165, 255, 0.3); border-color: #fff; box-shadow: 0 0 50px rgba(212, 165, 255, 0.5); }
        .soul-orb::after { content: 'REC'; font-size: 11px; letter-spacing: 3px; color: #fff; font-weight: 700; }
        
        .particle { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--primary-fairy); pointer-events: none; opacity: 0; }
        @keyframes floatUp { 0% { opacity: 0.8; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }

        #result-screen { display: none; perspective: 1500px; text-align: center; width: 100%; }
        
        /* 高級壓克力與動態流動邊框 */
        .pixxie-card { 
            width: var(--card-w); height: var(--card-h); 
            background: rgba(25, 18, 35, 0.65);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border-radius: 28px; 
            position: relative; margin: 0 auto 30px auto;
            transform-style: preserve-3d; 
            transition: transform 0.1s ease-out; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05); 
            overflow: hidden; 
            border: var(--border-width) solid transparent;
            background-clip: padding-box, border-box;
            background-image: 
                linear-gradient(rgba(25, 18, 35, 0.95), rgba(25, 18, 35, 0.95)), 
                conic-gradient(from calc(var(--rx, 0.5) * 360deg), var(--primary-fairy), rgba(212,165,255,0.1), #fff, var(--primary-fairy));
            background-origin: border-box;
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }
        
        /* SS Rank 全息膜層 */
        .pixxie-card.rank-ss::after { 
            content: ''; position: absolute; inset: 0; z-index: 10; 
            background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.1) 20%, rgba(255,117,195,0.4) 40%, rgba(161,140,209,0.5) 50%, rgba(68,227,255,0.4) 60%, rgba(255,255,255,0.1) 80%, transparent 100%); 
            background-size: 300% 300%; 
            background-position: calc(var(--rx, 0.5) * 100%) calc(var(--ry, 0.5) * 100%); 
            mix-blend-mode: color-dodge; opacity: 0; transition: opacity 0.8s;
            border-radius: 28px; pointer-events: none;
        }

        /* 三角形碎鑽全息感 */
        .pixxie-card.special-holo::before {
            content: ''; position: absolute; inset: 0; z-index: 12;
            background-image: 
                conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,0.12) 0deg, transparent 60deg),
                conic-gradient(from 120deg at 30% 40%, rgba(212,165,255,0.2) 0deg, transparent 80deg),
                conic-gradient(from 240deg at 70% 60%, rgba(68,227,255,0.15) 0deg, transparent 100deg);
            background-size: 120px 120px;
            mix-blend-mode: overlay; 
            opacity: 0; pointer-events: none;
            background-position: calc(var(--rx, 0.5) * 60px) calc(var(--ry, 0.5) * 60px);
            transition: opacity 0.8s;
            border-radius: 28px;
        }

        .pixxie-card.revealed::after { opacity: 1; }
        .pixxie-card.revealed.special-holo::before { opacity: 0.7; }

        #webgl-container { width: 100%; height: 350px; margin-top: 10px; position: relative; z-index: 2; pointer-events: none; }

        /* 回復原來的文字位置 (左下) */
        .card-info { width: 85%; margin: 0 auto 35px auto; text-align: left; position: relative; z-index: 5; }
        .song-title { font-size: 1.7rem; font-weight: 800; margin: 0; color: #fff; text-shadow: 0 0 18px var(--primary-fairy); letter-spacing: 1.5px; }
        .lyrics { font-size: 0.85rem; color: rgba(255,255,255,0.7); margin-top: 12px; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 12px; }
        .rank-badge { display: inline-block; padding: 3px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; margin-top: 18px; border: 1px solid rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
        .ss-style { color: #ff75c3; border-color: #ff75c3; box-shadow: 0 0 15px rgba(255,117,195,0.3); background: rgba(255,117,195,0.1); }
        
        .btn-group { display: flex; gap: 12px; width: var(--card-w); margin: 0 auto; z-index: 20; position: relative; }
        .btn-action { flex: 1; padding: 16px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.1); color: #fff; font-weight: bold; font-size: 0.9rem; cursor: pointer; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 class="main-title animate-item">PiXXiE</h1>
        <p class="sub-title animate-item delay-1">SONIC SOUL RESONANCE</p>
        <div class="orb-container animate-item delay-2">
            <div class="mic-wave w1"></div>
            <div class="mic-wave w2"></div>
            <div class="mic-wave w3"></div>
            <div class="mic-wave w4"></div>
            <div class="soul-orb" id="recordBtn"></div>
        </div>
        <p style="margin-top: 60px; font-size: 0.65rem; color: rgba(212,165,255,0.5); letter-spacing: 3px; font-weight: bold;" class="animate-item delay-2">HOLD ORB TO RESONATE</p>
    </div>

    <div id="result-screen">
        <div class="pixxie-card" id="soulCard">
            <div id="webgl-container"></div>
            <div class="card-info">
                <h3 class="song-title">Resonating...</h3>
                <p class="lyrics">Analyzing your vibration.</p>
                <div class="rank-badge">Matching</div>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-action" onclick="location.reload()">RE-TRY</button>
            <button class="btn-action" id="downloadBtn" style="background: rgba(212,165,255,0.15); border-color: rgba(212,165,255,0.3);">COLLECT</button>
        </div>
    </div>

<script>
// --- 核心資料庫 ---
const songDatabase = {
    "Q1": [
        { title: "Shake!", col1: "#ff3300", col2: "#ffcc00", keywords: ["shake", "เชค", "summer shake"] },
        { title: "FYI", col1: "#ff0066", col2: "#ff99cc", keywords: ["fyi","ก็มันชอบอยู่ชอบอยู่"] },
        { title: "ACHOO!", col1: "#00ccff", col2: "#00ff99", keywords: ["achoo", "ฮัดชิ้ว", "พิมมา"] },
        { title: "Not Bad", col1: "#333333", col2: "#00ff88", keywords: ["not bad", "ก็ไม่ได้แย่"] },
        { title: "Game Changer", col1: "#6600ff", col2: "#00ffff", keywords: ["game changer","hair flip"] }
    ],
    "Q2": [
        { title: "Mutelu", col1: "#200a44", col2: "#cc33ff", keywords: ["mutelu", "มูเตลู"] },
        { title: "Pick A Card", col1: "#ff0033", col2: "#000000", keywords: ["pick a card"] },
        { title: "Dejayou", col1: "#330066", col2: "#ff00ff", keywords: ["dejayou", "deja"] },
        { title: "TOXIQUE", col1: "#111111", col2: "#ff0000", keywords: ["toxique", "toxic"] },
        { title: "Magic Car", col1: "#0055ff", col2: "#00ffcc", keywords: ["magic car"] },
        { title: "ONE SHOT", col1: "#cc0000", col2: "#333333", keywords: ["one shot"] },
        { title: "HUH?", col1: "#ffff00", col2: "#000000", keywords: ["huh"] },
        { title: "FEAT", col1: "#ff6600", col2: "#ff0066", keywords: ["feat","F E A T"] },
        { title: "BADLY", col1: "#440000", col2: "#ff3300", keywords: ["badly"] }
    ],
    "Q3": [
        { title: "Too Cute", col1: "#ff99cc", col2: "#ffffff", keywords: ["too cute", "เกินต้าน"] },
        { title: "PiXXeL", col1: "#ffccff", col2: "#d4a5ff", keywords: ["pixxel","พักบ้างหรือยัง"] },
        { title: "DED", col1: "#00ffaa", col2: "#ffff00", keywords: ["ded", "เด็ด"] },
        { title: "Heartstopper", col1: "#ff3399", col2: "#ffccff", keywords: ["heartstopper", "มาเบล"] },
        { title: "Into You", col1: "#cc99ff", col2: "#ffe6f2", keywords: ["into you"] },
        { title: "Boo", col1: "#99ffcc", col2: "#ffffff", keywords: ["boo","งอนนะ"] }
    ],
    "Q4": [
        { title: "rain", col1: "#0a2a66", col2: "#44e3ff", keywords: ["rain", "ติดฝน"] },
        { title: "Aftercry", col1: "#1a1a2e", col2: "#16213e", keywords: ["aftercry", "it will be better"] },
        { title: "Deep Talk", col1: "#0f3460", col2: "#e94560", keywords: ["deep talk", "อิงโกะ"] },
        { title: "ไม่ได้ก็ไม่เอา", col1: "#ff66aa", col2: "#ffcc33", keywords: ["whatever", "ไม่ได้ก็ไม่เอา"] }
    ]
};

let audioCtx, analyser, dataArray, isRecording = false, audioHistory = [];
let recognizedText = "";
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
let particleInterval;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'th-TH'; recognition.continuous = true; recognition.interimResults = true;
    recognition.onresult = (e) => {
        recognizedText = "";
        for (let i = 0; i < e.results.length; i++) { recognizedText += e.results[i][0].transcript.toLowerCase(); }
    };
}

let scene, camera, renderer, material;
let uniformAmp = { value: 0.0 }, uCol1 = { value: new THREE.Color() }, uCol2 = { value: new THREE.Color() };
let threeInitialized = false;

// WebGL 靈魂球體優化 (Perlin Noise 流體 + Fresnel 發光)
function initThreeJS() {
    if (threeInitialized) return;
    const container = document.getElementById('webgl-container');
    const w = 320; const h = 350;
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    camera.position.z = 2.8;
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(w, h);
    container.appendChild(renderer.domElement);
    
    const geo = new THREE.SphereGeometry(0.82, 128, 128);
    material = new THREE.ShaderMaterial({
        transparent: true,
        uniforms: { uTime: { value: 0 }, uAmp: uniformAmp, col1: uCol1, col2: uCol2 },
        vertexShader: `
            uniform float uTime; uniform float uAmp; varying vec3 vNormal; 
            void main() { 
                vNormal = normal;
                float noise = sin(position.x * 2.0 + uTime) * cos(position.y * 2.0 + uTime) * sin(position.z * 2.0 + uTime);
                noise += 0.5 * sin(position.x * 4.0 - uTime * 1.5);
                noise += 0.25 * cos(position.y * 8.0 + uTime);
                float displacement = noise * uAmp * 0.45;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position + normal * displacement, 1.0); 
            }`,
        fragmentShader: `
            uniform vec3 col1; uniform vec3 col2; varying vec3 vNormal; 
            void main() { 
                float fresnel = pow(1.0 - max(dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0), 3.0);
                vec3 baseCol = mix(col1, col2, vNormal.y * 0.5 + 0.5);
                vec3 glow = baseCol + (fresnel * 2.5 * baseCol); 
                gl_FragColor = vec4(glow, 0.95); 
            }`
    });
    scene.add(new THREE.Mesh(geo, material));
    const anim = () => { requestAnimationFrame(anim); material.uniforms.uTime.value += 0.012; renderer.render(scene, camera); };
    anim();
    threeInitialized = true;
}

const orb = document.getElementById('recordBtn');
const waves = [document.querySelector('.w1'), document.querySelector('.w2'), document.querySelector('.w3'), document.querySelector('.w4')];

function createParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const distance = 80 + Math.random() * 50;
    p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--ty', `${Math.sin(angle) * distance - 50}px`);
    p.style.left = '50%'; p.style.top = '50%';
    p.style.animation = `floatUp ${0.6 + Math.random() * 0.4}s ease-out forwards`;
    document.querySelector('.orb-container').appendChild(p);
    setTimeout(() => p.remove(), 1000);
}

async function startResonance(e) {
    e.preventDefault();
    orb.classList.add('recording');
    if (!audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (err) { alert("請允許麥克風權限以進行共鳴。"); return; }
    }
    isRecording = true; audioHistory = []; recognizedText = "";
    if (recognition) { try { recognition.start(); } catch(err) {} }
    particleInterval = setInterval(createParticle, 100);
    loop();
}

function loop() {
    if (!isRecording) return;
    requestAnimationFrame(loop);
    analyser.getByteFrequencyData(dataArray);
    let avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;
    audioHistory.push(avg);
    
    // 多層聲波
    waves[0].style.transform = `scale(${0.8 + avg / 100})`; waves[0].style.opacity = 0.5 + avg/150;
    waves[1].style.transform = `scale(${1.0 + avg / 80})`; waves[1].style.opacity = 0.3 + avg/200;
    waves[2].style.transform = `scale(${1.2 + avg / 60})`; waves[2].style.opacity = 0.2 + avg/300;
    waves[3].style.transform = `scale(${1.0 + avg / 40})`; waves[3].style.opacity = (avg/255) * 0.4;
    
    uniformAmp.value = avg / 55;
}

function endResonance(e) {
    e.preventDefault();
    if (!isRecording) return;
    isRecording = false;
    orb.classList.remove('recording');
    clearInterval(particleInterval);
    waves.forEach(w => w.style.opacity = 0);
    if (recognition) { try { recognition.stop(); } catch(err) {} }
    setTimeout(calculateResult, 600);
}

function calculateResult() {
    const frames = audioHistory.length;
    const avgVol = audioHistory.reduce((a,b)=>a+b,0)/frames || 0;
    const allSongs = Object.values(songDatabase).flat();
    let finalSong = null; let c1, c2, isSpecial = false;

    if (recognizedText.includes("mabel") || recognizedText.includes("มาเบล")) { c1 = "#ff0033"; c2 = "#8800ff"; isSpecial = true; finalSong = songDatabase["Q3"][3]; }
    else if (recognizedText.includes("ingkho") || recognizedText.includes("อิงโกะ")) { c1 = "#ffff00"; c2 = "#ff66aa"; isSpecial = true; finalSong = songDatabase["Q4"][2]; }
    else if (recognizedText.includes("pimma") || recognizedText.includes("พิมมา")) { c1 = "#0088ff"; c2 = "#00ffaa"; isSpecial = true; finalSong = songDatabase["Q1"][2]; }

    if (!finalSong) finalSong = allSongs.find(s => s.keywords.some(k => recognizedText.includes(k)));
    if (!finalSong) {
        const targetCat = ["Q1", "Q2", "Q3", "Q4"][Math.floor(avgVol) % 4];
        finalSong = songDatabase[targetCat][Math.floor(Math.random() * songDatabase[targetCat].length)];
    }

    uCol1.value.set(c1 || finalSong.col1);
    uCol2.value.set(c2 || finalSong.col2);
    document.querySelector('.song-title').innerText = finalSong.title;

    const card = document.getElementById('soulCard');
    const badge = document.querySelector('.rank-badge');
    if (frames > 150 || isSpecial) {
        card.className = "pixxie-card rank-ss";
        badge.innerText = "SS Rank Resonance";
        badge.className = "rank-badge ss-style";
    } else {
        card.className = "pixxie-card";
        badge.innerText = "S Rank Harmony";
        badge.className = "rank-badge";
    }

    if (["ACHOO!", "Deep Talk", "Heartstopper"].includes(finalSong.title)) card.classList.add('special-holo');

    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    initThreeJS();
    setTimeout(() => card.classList.add('revealed'), 200);
}

orb.addEventListener('mousedown', startResonance);
orb.addEventListener('mouseup', endResonance);
orb.addEventListener('touchstart', startResonance, {passive: false});
orb.addEventListener('touchend', endResonance, {passive: false});

const card = document.getElementById('soulCard');
const handleMove = (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const px = (x - rect.left) / rect.width;
    const py = (y - rect.top) / rect.height;
    card.style.setProperty('--rx', px); card.style.setProperty('--ry', py);
    card.style.transform = `rotateY(${(px - 0.5) * 20}deg) rotateX(${(py - 0.5) * -20}deg)`;
};
card.addEventListener('mousemove', handleMove);
card.addEventListener('touchmove', handleMove, {passive: true});
</script>
</body>
</html>
