    <style>

        body {

}

/* --- 動態背景：夢幻極光 --- */
.aurora-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; /* 確保在最底層 */
    background: linear-gradient(180deg, #573182 0%, #c28bd9 40%, #371559 100%);
    overflow: hidden;
}


/* 隱藏 YouTube 播放器容器 */
#youtube-player-container {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
}

/* 膠片噪點遮罩 */
body::before {
    content: "";
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.05; pointer-events: none; z-index: 1;
}
/* --- 2. 確保 UI 容器層級高於噪點 --- */
#intro-screen, #result-screen {
    position: relative;
    z-index: 10; /* 高於噪點的 1 */
}

/* --- 標題字體升級 --- */
#pixxieTitle {
    font-family: 'Syne', sans-serif; /* 使用新的時尚字體 */
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 5;
    /* 增加標題的微光質感 */
    background: linear-gradient(to right, #fff, #f5cdfa, #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(212, 165, 255, 0.3);
	
}

.glow-burst { 
    text-shadow: 0 0 40px #fff; 
    transform: scale(1.05); 
}

        body::after { 
            content: ''; position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 50%, rgba(212, 165, 255, 0.08) 0%, transparent 80%); 
            z-index: 0; pointer-events: none; 
        }
        
        @keyframes fairyIn { 
            0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(10px); } 
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
        }
        
        .animate-item { opacity: 0; animation: fairyIn 1s cubic-bezier(0.15, 0.85, 0.35, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; } 
        .delay-2 { animation-delay: 0.4s; }
        
        #intro-screen { text-align: center; z-index: 10; width: 100%; position: relative; display: block; }
        
        /* 修正：移除 uppercase，保留 PiXXiE 原始大小寫 */
        .main-title { 
            font-size: 2.8rem; font-weight: 200; letter-spacing: 12px; 
            background: linear-gradient(to bottom, #fff, var(--primary-fairy)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; 
            cursor: pointer;
            transition: all 0.3s ease;
        }
	

        /* PiXXiE 標題點擊彩蛋特效 */
        .main-title.glow-burst {
            text-shadow: 0 0 20px #fff, 0 0 40px var(--primary-fairy), 0 0 60px #ff99cc;
            transform: scale(1.05);
        }
        
        .sub-title { font-size: 0.7rem; letter-spacing: 5px; color: rgba(255,255,255,0.4); margin-bottom: 60px; }
        
        /* 多層次聲波環佈局 */
        .orb-container { 
            position: relative; width: 280px; height: 280px; 
            margin: 0 auto; display: flex; align-items: center; justify-content: center; 
        }
        
        .mic-wave { 
            position: absolute; border-radius: 50%; border: 3px solid var(--primary-fairy); 
            opacity: 0.3; pointer-events: none; 
            transition: transform 0.1s ease-out, opacity 0.2s; 
        }
/* 錄音時的狀態 (JS 控制) */
.mic-wave.active {
    opacity: var(--wave-opacity, 0.5);
}
        .w1 { width: 120px; height: 120px; border-width: 2px; z-index: 4; }
        .w2 { width: 160px; height: 160px; border-width: 1px; opacity: 0.4; z-index: 3; }
        .w3 { width: 210px; height: 210px; border-width: 0.5px; border-style: dashed; z-index: 2; }
        .w4 { width: 260px; height: 260px; border-width: 8px; filter: blur(15px); opacity: 0; z-index: 1; }

        @keyframes breathe { 
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212, 165, 255, 0.1), inset 0 0 20px rgba(255,255,255,0.1); } 
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 165, 255, 0.3), inset 0 0 30px rgba(255,255,255,0.2); } 
        }
        
        .soul-orb { 
            width: 120px; height: 120px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, #fff, var(--primary-fairy)); border: 4px solid rgba(212, 165, 255, 0.4); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            cursor: pointer; position: relative; z-index: 5; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; justify-content: center; 
            animation: breathe 3s ease-in-out infinite; 
	--mic-vol: 0; /* 用於 JS 控制的變數 */
        }

.soul-orb, .title-container {
    will-change: transform, opacity; /* 告訴瀏覽器這些屬性會變動 */
    -webkit-backface-visibility: hidden; /* 防止閃爍 */
    backface-visibility: hidden;
}

        .soul-orb.recording { animation: recording-breathe 1.5s ease-in-out infinite; transform: scale(0.9); background: rgba(212, 165, 255, 0.3); border: 2px solid #ffffff !important; box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 
                inset 0 0 15px rgba(255, 255, 255, 0.5); }
@keyframes breathe { 
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212, 165, 255, 0.1), inset 0 0 20px rgba(255,255,255,0.1); } 
    50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 165, 255, 0.3), inset 0 0 30px rgba(255,255,255,0.2); } 
}

        .particle { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--primary-fairy); pointer-events: none; opacity: 0; }
        @keyframes floatUp { 0% { opacity: 0.8; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }

/* 新增：聲控日冕（Aura）- 使用 ::before 避免衝突 */
.soul-orb::before {
    content: '';
    position: absolute;
    inset: -30px;
    background: var(--primary-fairy);
    border-radius: 50%;
    filter: blur(25px);
    z-index: -1;
    opacity: calc(0.1 + var(--mic-vol) * 0.8); /* 隨音量變動透明度 */
    transform: scale(calc(1 + var(--mic-vol) * 1.3)); /* 隨音量變動大小 */
    transition: transform 0.05s ease-out, opacity 0.05s ease-out;
    pointer-events: none;
}
        .soul-orb::after { content: 'REC'; font-size: 11px; letter-spacing: 3px; color: #bf5ee6; font-weight: 700; }
        
        /* 升級版全局閃粉特效 (粉紅、黃、綠、水藍、粉紫) */
        .fairy-dust {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            mix-blend-mode: screen;
        }
        @keyframes dustFall {
            0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.1) rotate(180deg); }
        }

        #result-screen { display: none; min-height: 100dvh; padding: 20px; overflow: hidden; perspective: 1500px; text-align: center; width: 100%; }
        
        /* 高級壓克力與動態流動邊框 */
        .pixxie-card { 
            width: var(--card-w); height: var(--card-h);
		aspect-ratio: 300 / 520;
		max-height: 80dvh; 
            background: transparent;
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border-radius: 28px; 
            position: relative; margin: 2vh auto 30px auto;
            transform-style: preserve-3d; 
            transition: transform 0.1s ease-out; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05); 
            overflow: hidden; 
            border: var(--border-width) solid transparent;
            background-clip: padding-box, border-box;
            background-image: 
                var(--card-bg-style, linear-gradient(135deg, #1a1a2e, #0d0d1a)), 
        conic-gradient(from calc(var(--rx, 0.5) * 360deg), var(--border-grad));
           background-origin: border-box;
            -webkit-mask-image: -webkit-radial-gradient(white, black);
	z-index:10
        }
 
/* --- A Rank: Low Lightness Single Color (Q1-Q4 based) + Fluid Light Border --- */
.rank-a {
    /* JS will inject --bg-q-color based on the quarter */
    --card-bg-style: linear-gradient(135deg, var(--bg-q-color, #1a1a2e), #0d0d10);
    /* Fluid glowing border like Picture 1 */
    --border-grad: rgba(212, 165, 255, 0.05), rgba(212, 165, 255, 0.8), rgba(212, 165, 255, 0.05), rgba(212, 165, 255, 0.8), rgba(212, 165, 255, 0.05);
}

/* --- S Rank: Centric Gradient (Random Double Colors) + Fluid Light Border --- */
.rank-s {
/* 這裡使用 conic-gradient 實現塊狀分佈 */
    /* 加入了 rgba(255,255,255,0.6) 作為你要求的一抹白色光澤 */
    --card-bg-style: conic-gradient(
        from 180deg at 50% 50%,
        var(--bg-g1) 0deg,
        var(--bg-g2) 90deg,
        rgba(255, 255, 255, 0.7) 120deg, /* 白色光澤 */
        var(--bg-g1) 150deg,
        var(--bg-g2) 240deg,
        rgba(255, 255, 255, 0.4) 300deg, /* 第二抹光澤 */
        var(--bg-g1) 360deg
    );
    
    /* 修正 Border：確保使用 ::before 渲染流動邊框 */
    --border-grad: #ffffff, var(--primary-fairy), #ffffff;
}

/* 修正 S 級邊框消失的問題，確保有基本的 border 顯現 */
.rank-s::before {
    content: '';
    position: absolute;
    inset: calc(var(--border-width) * -1);
    z-index: -1;
    background: conic-gradient(from var(--border-angle), var(--border-grad));
    border-radius: 28px;
    animation: rotate 3s linear infinite;
}

/* --- SS Rank: White-Pink-Purple Fluid Shining Border + Holo Diamonds --- */
.rank-ss {
    --card-bg-style: linear-gradient(135deg, var(--bg-g1, #130521), var(--bg-g2, #3d1366));
    /* White, Pink, Purple shining border */
    --border-grad: #ffffff, #ffb6c1, #d4a5ff, #ffffff, #ffb6c1, #d4a5ff, #ffffff;
    box-shadow: 0 0 30px rgba(212, 165, 255, 0.3), 0 40px 100px rgba(0,0,0,0.8);
}

/* --- SSS Rank: Linear Dark Rainbow Background + Rainbow Border + Holo Diamonds --- */
.rank-sss {
    /* Linear rainbow background (not too bright to keep words readable) */
    --card-bg-style: linear-gradient(135deg, #b868e3, #68ace3, #68e397, #e3dd68, #e36868);
    /* Picture 3's Rainbow Border */
    --border-grad: #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000;
    box-shadow: 0 0 40px rgba(255, 255, 255, 0.2), 0 40px 100px rgba(0,0,0,0.9);
}

let scene, camera, renderer, material;
let uniformAmp = { value: 0.0 }, uCol1 = { value: new THREE.Color() }, uCol2 = { value: new THREE.Color() };
let threeInitialized = false;

function initThreeJS() {
    if (threeInitialized) return;
    const container = document.getElementById('webgl-container');
    const w = container.clientWidth || 320; 
    const h = container.clientHeight || 500;
    scene = new THREE.Scene();
    
    // 長寬比改為動態比例
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    camera.position.z = 2.8;
    
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(w, h);
    container.appendChild(renderer.domElement);
    
    const geo = new THREE.SphereGeometry(0.82, 128, 128);
    const colorBright = new THREE.Color('#f8e8fa');
    const colorShadow = new THREE.Color('#f5cdfa');

    material = new THREE.ShaderMaterial({
        transparent: true,
        uniforms: { 
            uTime: { value: 0 }, 
            uAmp: uniformAmp, 
            colBright: { value: colorBright }, 
            colShadow: { value: colorShadow } 
        },
        vertexShader: `
            uniform float uTime; uniform float uAmp; varying vec3 vNormal; varying float vDisplacement;
            void main() { 
                vNormal = normal;
                float noise = sin(position.x * 2.0 + uTime) * cos(position.y * 2.0 + uTime) * sin(position.z * 2.0 + uTime);
                noise += 0.5 * sin(position.x * 4.0 - uTime * 1.5);
                float displacement = noise * uAmp * 0.45;
                vDisplacement = displacement;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position + normal * displacement, 1.0); 
            }`,
        fragmentShader: `
            uniform vec3 colBright; uniform vec3 colShadow; varying vec3 vNormal; varying float vDisplacement;
            void main() { 
                float fresnel = pow(1.0 - max(dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0), 2.5);
                vec3 baseCol = mix(colShadow, colBright, vNormal.y * 0.5 + 0.5 + vDisplacement);
                vec3 finalCol = baseCol + (fresnel * 0.3 * colBright); 
                gl_FragColor = vec4(finalCol, 0.95); 
            }`
    });

    scene.add(new THREE.Mesh(geo, material));

    const anim = () => { 
        requestAnimationFrame(anim); 
        material.uniforms.uTime.value += 0.012; 
        renderer.render(scene, camera); 
    };
    anim();
    threeInitialized = true;
}

const orb = document.getElementById('recordBtn');
const waves = [document.querySelector('.w1'), document.querySelector('.w2'), document.querySelector('.w3'), document.querySelector('.w4')];

async function startResonance(e) {
    e.preventDefault();
    orb.classList.add('recording');
    
    // 點擊球體時噴發閃粉
    const rect = orb.getBoundingClientRect();
    spawnDust(rect.left + rect.width/2, rect.top + rect.height/2, 4);

    if (!audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (err) { alert("請允許麥克風權限以進行共鳴。"); return; }
    }
    isRecording = true; audioHistory = []; recognizedText = "";
    if (recognition) { try { recognition.start(); } catch(err) {} }
	    particleInterval = setInterval(createParticle, 100);
    loop();
}

function loop() {
    if (!isRecording) return;
    requestAnimationFrame(loop);
    analyser.getByteFrequencyData(dataArray);
    let avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;
    audioHistory.push(avg);uniformAmp.value = avg / 55;
    
// 2. 更新你原本的 4 道 Wave 邏輯
    waves.forEach((w, i) => {
        if (!w) return;
        let scale = 1 + (avg / (120 - i * 20));
        w.style.transform = `scale(${scale})`;
        w.style.opacity = Math.max(0.15, Math.min(avg / 80, 0.7));
    });

// 3. 更新日冕 (Aura) 效果
    // 將平均音量轉換為 0~1 的比例
    let normalizedVol = Math.min(avg / 80, 1);
    orb.style.setProperty('--mic-vol', normalizedVol);
}


// 新增：限制明度 (Lightness) 在 35%-55% 之間，避免產生純白 (100%)，確保文字清晰
function getRandomVibrantColor() {
    const h = Math.floor(Math.random() * 360);
    const s = 70 + Math.random() * 30; // 70%-100% 飽和度
    const l = 35 + Math.random() * 20; // 35%-55% 明度 (No pure white)
    return `hsl(${h}, ${s}%, ${l}%)`;
}

function endResonance(e) {

function calculateResult() {
    const frames = audioHistory.length;
    const avgVol = audioHistory.reduce((a,b)=>a+b,0)/frames || 0;
    const allSongs = Object.values(songDatabase).flat();
    let finalSong = null; let isMemberKey = false;
    let category = "Q1";

    const text = recognizedText.toLowerCase();

    // 1. 識別關鍵字
    if (text.includes("mabel") || text.includes("มาเบล")) { isMemberKey = true; finalSong = songDatabase["Q3"][3]; category = "Q3"; }
    else if (text.includes("ingkho") || text.includes("อิงโกะ")) { isMemberKey = true; finalSong = songDatabase["Q4"][2]; category = "Q4"; }
    else if (text.includes("pimma") || text.includes("พิมมา")) { isMemberKey = true; finalSong = songDatabase["Q1"][2]; category = "Q1"; }

    if (!finalSong) {
        for (const [key, songs] of Object.entries(songDatabase)) {
            const found = songs.find(s => s.keywords.some(k => text.includes(k)));
            if (found) { finalSong = found; category = key; break; }
        }
    }

    if (!finalSong) {
        category = ["Q1", "Q2", "Q3", "Q4"][Math.floor(avgVol) % 4];
        finalSong = songDatabase[category][Math.floor(Math.random() * songDatabase[category].length)];
    }

    const card = document.getElementById('soulCard');
    const badge = document.querySelector('.rank-badge');

    // 確保浮水印存在

        const wm = document.createElement('div');
        wm.className = 'watermark';
        wm.innerText = 'by Grafittiii';
        card.appendChild(wm);
    }

    document.querySelector('.song-title').innerText = finalSong.title;

    // 清空舊樣式並套用新季度背景裝飾
    card.className = "pixxie-card";

    // --- 階級分類邏輯 (A, S, SS, SSS) ---
    const ssSpecial = ["ACHOO!", "Deep Talk", "Heartstopper"].includes(finalSong.title);
    let finalRank = "A";

    if (frames > 60 && avgVol > 28) {
        finalRank = "SSS";
    } 
    else if (ssSpecial || isMemberKey) {
        finalRank = "SS";
    } 
    else if (finalSong.bg1 || frames > 30 || avgVol > 20 ) {
        finalRank = "S";
    } 
    else {
        finalRank = "A";
    }

    // --- 套用 Rank 專屬視覺 ---
    if (finalRank === "SSS") {
        card.classList.add("rank-sss", "special-holo");
        badge.innerText = "SSS Rank Resonance";
        badge.className = "rank-badge sss-style";

        card.classList.add("rank-ss", "special-holo");
        badge.innerText = "SS Rank Harmony";
        badge.className = "rank-badge ss-style";
    } else if (finalRank === "S") {

        badge.innerText = "S Rank Harmony";
        badge.className = "rank-badge s-style";
        const c1 = finalSong.bg1 || getRandomVibrantColor();

        card.style.setProperty('--bg-g1', c1);
        card.style.setProperty('--bg-g2', c2);
    } else {
        card.classList.add("rank-a");

            "Q1": "#701b1b",

            "Q3": "#e66cbf",

 if (player && typeof player.loadVideoById === 'function') {

    // 顯示結果
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    initThreeJS();
    setTimeout(() => card.classList.add('revealed'), 200);
}

let isPlaying = true; // 因為 calculateResult 觸發時會自動播放，所以預設為 true

document.addEventListener('DOMContentLoaded', () => {
    const musicBtn = document.getElementById('musicToggleBtn');

    if (musicBtn) {
        musicBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // 防止事件冒泡
            
            // 點擊動畫
            this.classList.add('animating');
            setTimeout(() => this.classList.remove('animating'), 600);

            // 檢查 YouTube API 是否準備好
            if (!player || typeof player.getPlayerState !== 'function') {
                console.log("YouTube Player 尚未就緒");
                return;
            }

            // 取得目前播放狀態：1 是播放中，2 是暫停
            const state = player.getPlayerState();

            if (state === 1) { // 正在播放，執行暫停
                player.pauseVideo();
                this.innerText = "♫"; // 顯示播放符號
                isPlaying = false;
            } else { // 正在暫停，執行播放
                player.playVideo();
                this.innerText = "□"; // 顯示停止符號
                isPlaying = true;
            }
        });
    }

    // 修復 Retry 時也要重置音樂按鈕
    const retryBtn = document.getElementById('retryBtn');
    if (retryBtn) {
        retryBtn.addEventListener('click', function() {
            // ... 你原本的 retry 邏輯 ...
            
            // 重置音樂按鈕符號
            if (musicBtn) {
                musicBtn.innerText = "□";
                isPlaying = true;
            }
        });
    }
});

// Re-try 按鈕點擊過渡效果
document.getElementById('retryBtn').addEventListener('click', function(e) {
    e.preventDefault();
    this.classList.add('animating');
    const rect = this.getBoundingClientRect();
    spawnDust(rect.left + rect.width / 2, rect.top + rect.height / 2, 8); // 炸出大量閃粉
// [新增] 停止播放
    if (player && typeof player.stopVideo === 'function') {
        player.stopVideo();
    }
    
setTimeout(() => {
    this.classList.remove('animating');

    const intro = document.getElementById('intro-screen');
    const result = document.getElementById('result-screen');
    const orb = document.getElementById('orb');
    const title = document.querySelector('.title-container'); // 假設你的標題容器名稱

    if (intro && result) {
        result.style.display = 'none';
        // 使用空字串，讓它自動回歸 CSS 裡定義的屬性（flex 或 block）
        intro.style.display = ''; 
        
        // --- [關鍵] 強制重置視覺屬性 ---
        if (orb) {
            orb.style.opacity = "1";
            orb.style.transform = "scale(1)";
            orb.style.visibility = "visible";
            orb.className = "soul-orb"; // 移除 recording 等 class
        }
        
        if (title) {
            title.style.opacity = "1";
            title.style.transform = "translateY(0)";
        }
        
        // 強制手機瀏覽器重繪 (Reflow)
        void intro.offsetHeight; 
    }

    // 恢復背景波紋
    if (typeof waves !== 'undefined') {
        waves.forEach(w => {
            w.style.opacity = "0.15";
            w.style.transform = "scale(1)";
        });
    }

    // 解決手機版可能產生的捲動問題
    window.scrollTo(0, 0);

}, 600);
});

</script>
</body>
