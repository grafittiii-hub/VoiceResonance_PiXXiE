<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiXXiE Soul Resonance - Holographic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;800;900&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { --primary-fairy: #d4a5ff; --bg-dark: #0a0b10; --card-w: 320px; --card-h: 520px; }
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-user-drag: none; outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        /* 1. 字型設定更新 */
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: #fff; font-family: 'Montserrat', 'Prompt', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; touch-action: none; overscroll-behavior: none; }
        body::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(212, 165, 255, 0.08) 0%, transparent 80%); z-index: 0; pointer-events: none; }
        
        @keyframes fairyIn { 0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(10px); } 100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
        .animate-item { opacity: 0; animation: fairyIn 1s cubic-bezier(0.15, 0.85, 0.35, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; } .delay-2 { animation-delay: 0.4s; }
        
        #intro-screen { text-align: center; z-index: 10; width: 100%; position: relative; }
        .main-title { font-size: 2.8rem; font-weight: 200; letter-spacing: 12px; background: linear-gradient(to bottom, #fff, var(--primary-fairy)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; text-transform: uppercase; font-family: 'Montserrat', sans-serif; }
        .sub-title { font-size: 0.7rem; letter-spacing: 5px; color: rgba(255,255,255,0.4); margin-bottom: 60px; font-weight: 400; }
        
        /* 3. 錄音互動特效優化 */
        .orb-container { position: relative; width: 220px; height: 220px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212, 165, 255, 0.1), inset 0 0 20px rgba(255,255,255,0.1); } 50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 165, 255, 0.3), inset 0 0 30px rgba(255,255,255,0.2); } }
        
        .soul-orb { width: 120px; height: 120px; border-radius: 50%; background: rgba(212, 165, 255, 0.12); border: 1px solid rgba(212, 165, 255, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); cursor: pointer; position: relative; z-index: 5; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; animation: breathe 3s ease-in-out infinite; }
        .soul-orb.recording { animation: none; transform: scale(0.9); background: rgba(212, 165, 255, 0.3); border-color: #fff; box-shadow: 0 0 50px rgba(212, 165, 255, 0.5); }
        .soul-orb::after { content: 'REC'; font-size: 11px; letter-spacing: 3px; color: #fff; font-weight: 700; opacity: 0.8; }
        
        /* 多層次聲波環 */
        .mic-wave { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid var(--primary-fairy); opacity: 0; transform: scale(0.5); pointer-events: none; }
        .w1 { transition: transform 0.1s ease-out, opacity 0.1s; }
        .w2 { transition: transform 0.2s ease-out, opacity 0.2s; border-width: 1px; }
        .w3 { transition: transform 0.3s ease-out, opacity 0.3s; border-width: 0.5px; border-style: dashed; }
        
        /* 漂浮星火粒子 */
        .particle { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--primary-fairy); pointer-events: none; opacity: 0; z-index: 4; }
        @keyframes floatUp { 0% { opacity: 0.8; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }

        #result-screen { display: none; perspective: 1500px; text-align: center; z-index: 20; position: relative; }
        
        /* 卡面質感升級 (毛玻璃) */
        .pixxie-card { width: var(--card-w); height: var(--card-h); background: rgba(17, 18, 24, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 28px; position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out; box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05); overflow: hidden; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.15); }
        
        /* SS級通用光澤 */
        .pixxie-card.rank-ss::after { content: ''; position: absolute; inset: 0; z-index: 10; background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.15) 20%, rgba(255,117,195,0.5) 40%, rgba(161,140,209,0.6) 50%, rgba(68,227,255,0.5) 60%, rgba(255,255,255,0.15) 80%, transparent 100%); background-size: 300% 300%; background-position: calc(var(--rx, 0.5) * 100%) calc(var(--ry, 0.5) * 100%); mix-blend-mode: color-dodge; opacity: 0; transition: opacity 0.8s; pointer-events: none; }
        
        /* 2. 限定歌曲專屬的 "全息碎閃紋理" */
        .pixxie-card.special-holo::before {
            content: ''; position: absolute; inset: 0; z-index: 12;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>');
            mix-blend-mode: color-dodge; opacity: 0; pointer-events: none;
            background-position: calc(var(--rx, 0.5) * 30px) calc(var(--ry, 0.5) * 30px);
            transition: opacity 0.8s;
        }
        .pixxie-card.revealed::after { opacity: 1; }
        .pixxie-card.revealed.special-holo::before { opacity: 0.35; } /* 碎閃透明度控制 */

        /* 3D 畫布容器修正 */
        #webgl-container { width: 100%; height: 320px; position: relative; z-index: 1; }

        .card-info { width: 85%; margin: -20px auto 35px auto; text-align: left; position: relative; z-index: 5; }
        /* 歌名加入淺紫光暈 */
        .song-title { font-size: 1.8rem; font-weight: 800; margin: 0; color: #fff; text-shadow: 0 0 15px var(--primary-fairy), 0 2px 5px rgba(0,0,0,0.8); line-height: 1.1; }
        .lyrics { font-size: 0.9rem; color: rgba(255,255,255,0.85); margin-top: 15px; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; font-weight: 300; }
        .rank-badge { display: inline-block; padding: 4px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; margin-top: 18px; border: 1px solid rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Montserrat', sans-serif; }
        .ss-style { color: #ff75c3; border-color: #ff75c3; box-shadow: 0 0 15px rgba(255,117,195,0.4); background: rgba(255,117,195,0.15); }
        
        .btn-group { display: flex; gap: 12px; width: var(--card-w); z-index: 20; margin: 0 auto; }
        .btn-action { flex: 1; padding: 16px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); font-weight: 700; font-size: 0.9rem; font-family: 'Montserrat', sans-serif; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

// --- 歌曲資料庫維持不變 ---
const songDatabase = {
    "Q1": [
        { title: "Shake!", col1: "#ff3300", col2: "#ffcc00", keywords: ["shake", "เชค", "summer shake", "shake it shake it"] },
        { title: "FYI", col1: "#ff0066", col2: "#ff99cc", keywords: ["fyi","ก็มันชอบอยู่ชอบอยู่","เธอรู้ยัง","เขินอยู่", "แต่กลัวไม่ทัน","ยังโสดอยู่นะ","จีบเธอก่อนแล้วกัน"] },
        { title: "ACHOO!", col1: "#00ccff", col2: "#00ff99", keywords: ["achoo", "ฮัดชิ้ว", "พิมมา", "I'mma I'mma", "allergic to you", "Pimma"] },
        { title: "Not Bad", col1: "#333333", col2: "#00ff88", keywords: ["not bad", "ก็ไม่ได้แย่"] },
        { title: "Game Changer", col1: "#6600ff", col2: "#00ffff", keywords: ["game changer","hair flip", "heart flip", "ไม่ดี", "game switch"] }
    ],

        { title: "Mutelu", col1: "#200a44", col2: "#cc33ff", keywords: ["mutelu", "มูเตลู", "พรหมลิขิตจะทำให้เราได้หากันเจอ", "oh ah-ah-ah-ah-ah-ah","Everything for you","cupid"] },
        { title: "Pick A Card", col1: "#ff0033", col2: "#000000", keywords: ["pick a card", "I'll tell you what to do","my baby boo"] },
        { title: "Dejayou", col1: "#330066", col2: "#ff00ff", keywords: ["dejayou", "deja","oh boy you make me","คิดถึงเธออีกแล้ว"] },
        { title: "TOXIQUE", col1: "#111111", col2: "#ff0000", keywords: ["toxique", "toxic", "girl you're toxic", "come a little closer now","you know it","don't ya"] },
        { title: "Magic Car", col1: "#0055ff", col2: "#00ffcc", keywords: ["magic car","ทุกอย่างบนโลกใบนี้ช่าง","สวยงาม","ไปหมดเลย","ทุกที่ช่างดูสดใส", "แค่ร่วมทางไปกับเธอ"] },
        { title: "ONE SHOT", col1: "#cc0000", col2: "#333333", keywords: ["one shot", "I've got"] },
        { title: "HUH?", col1: "#ffff00", col2: "#000000", keywords: ["huh","ไม่ได้เห็น", "พูดดังดังได้ไหม"] },
        { title: "FEAT", col1: "#ff6600", col2: "#ff0066", keywords: ["feat","F", "E","A", "T","get set go","are you a good boy","I'm a bad girl","lips"] },
        { title: "BADLY", col1: "#440000", col2: "#ff3300", keywords: ["badly","I want you"] }
    ],
    "Q3": [
        { title: "Too Cute", col1: "#ff99cc", col2: "#ffffff", keywords: ["too cute", "เกินต้าน","หลงเธออีกแล้ว","ก็เธอน่ารัก","จนเกินต้านขนาดนี้","จะรักคนคนนี้","ไม่ได้หรอก"] },
        { title: "PiXXeL", col1: "#ffccff", col2: "#d4a5ff", keywords: ["pixxel","พักบ้างหรือยัง","หากเธอล้มฉันจะรับ","หากเธอล้าให้เธอพัก"] },
        { title: "DED", col1: "#00ffaa", col2: "#ffff00", keywords: ["ded", "เด็ด","miss you", "อย่าให้ดอกไม้ เดี๋ยวฉันน่ะ","Ya-ya-ya-ya-ya-ya-a-a"] },
        { title: "Heartstopper", col1: "#ff3399", col2: "#ffccff", keywords: ["heartstopper", "มาเบล","Mabel","heart a a a a a stopper"] },
        { title: "Into You", col1: "#cc99ff", col2: "#ffe6f2", keywords: ["into you", "Like to spend my time with me","จะเปิดให้เธอเข้ามา","Cha-cha-di-da","Alright up to you"] },
        { title: "Boo", col1: "#99ffcc", col2: "#ffffff", keywords: ["boo","ya ya ya", "งอนนะ", "งอนแล้วนะ","งอนละ", "เธอไม่มาง้อกันสักที","ถ้าไม่มาขอโทษดีดี"] }
    ],
    "Q4": [
        { title: "rain", col1: "#0a2a66", col2: "#44e3ff", keywords: ["rain", "ติดเธอไม่ไหว", "ไม่ไหว", "ติดฝน","เธอต้องไปรึยัง","อยากเจอเธอทุกวัน","พอเป็นไปได้ไหม","ยู่ด้วยกันก่อนได้ไหม"] },
        { title: "Aftercry", col1: "#1a1a2e", col2: "#16213e", keywords: ["aftercry", "wohoo", "wu wu wu", "it will be better"] },
        { title: "Deep Talk", col1: "#0f3460", col2: "#e94560", keywords: ["deep talk", "Ingkho", "อิงโกะ","อยู่คุยกันคืนนี้ข้ามผ่านยามนิทรา","มาน่าฟังกว่าใคร","บทสนทนาไม่รู้เวลา", "ฉันฟังแต่เธอ"] },
        { title: "ไม่ได้ก็ไม่เอา (Whatever)", col1: "#ff66aa", col2: "#ffcc33", keywords: ["whatever", "ไม่ได้", "ไม่ได้ก็ไม่เอา","ฉันก็คงไม่รอแล้ว","ฉันก็คงต้องพอเสียที","ถ้าเธอไม่ใช่","ก็ไม่ต้องยื้อกันแบบนี้","เหนื่อยเต็มที","ไม่ได้ก็ไม่เอา"] }
    ]
};

let audioCtx, analyser, dataArray, isRecording = false, audioHistory = [];
let recognizedText = "";
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
let particleInterval;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'th-TH'; 
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = (e) => {
        recognizedText = "";
        for (let i = 0; i < e.results.length; i++) { recognizedText += e.results[i][0].transcript.toLowerCase(); }
    };
}

let scene, camera, renderer, material;
let uniformAmp = { value: 0.0 }, uCol1 = { value: new THREE.Color() }, uCol2 = { value: new THREE.Color() };
let threeInitialized = false;

// 4. Three.js 修正與 Shader 優化 (液態球體)
function initThreeJS() {
    if (threeInitialized) return;
    const container = document.getElementById('webgl-container');
    
    // 強制設定寬高，避免因 display:none 抓到 0x0
    const w = 320; 
    const h = 320;
    
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    camera.position.z = 2.4;
    
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(w, h);
    container.appendChild(renderer.domElement);
    
    const geo = new THREE.SphereGeometry(1, 128, 128);
    material = new THREE.ShaderMaterial({
        transparent: true,
        uniforms: { uTime: { value: 0 }, uAmp: uniformAmp, col1: uCol1, col2: uCol2 },
        // 改良 Vertex Shader: 使用混合正弦波模擬柏林雜訊 (Perlin-like 史萊姆流體感)
        vertexShader: `
            uniform float uTime; uniform float uAmp; varying vec3 vNormal; 
            void main() { 
                vNormal = normal; 
                float noise = sin(position.x * 3.0 + uTime) * cos(position.y * 3.0 + uTime) * sin(position.z * 3.0 + uTime);
                float n = noise * uAmp; 
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position + normal * (n * 0.4), 1.0); 
            }`,
        // 改良 Fragment Shader: 強化邊緣發光 (Rim Light / Bloom 錯覺)
        fragmentShader: `
            uniform vec3 col1; uniform vec3 col2; varying vec3 vNormal; 
            void main() { 
                float rim = 1.0 - max(dot(vNormal, vec3(0.0,0.0,1.0)), 0.0); 
                vec3 c = mix(col1, col2, vNormal.y * 0.5 + 0.5); 
                vec3 glow = c + pow(rim, 2.8) * 2.0; // 強化發光強度
                gl_FragColor = vec4(glow, 1.0); 
            }`
    });
    scene.add(new THREE.Mesh(geo, material));
    
    const anim = () => { 
        requestAnimationFrame(anim); 
        material.uniforms.uTime.value += 0.015; 
        renderer.render(scene, camera); 
    };
    anim();
    threeInitialized = true;
}

const orb = document.getElementById('recordBtn');
const w1 = document.querySelector('.w1'), w2 = document.querySelector('.w2'), w3 = document.querySelector('.w3');
const introScreen = document.getElementById('intro-screen');

// 生成漂浮星火
function createParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const distance = 80 + Math.random() * 50;
    p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--ty', `${Math.sin(angle) * distance - 50}px`);
    p.style.left = '50%'; p.style.top = '50%';
    p.style.animation = `floatUp ${0.6 + Math.random() * 0.4}s ease-out forwards`;
    document.querySelector('.orb-container').appendChild(p);
    setTimeout(() => p.remove(), 1000);
}

async function startResonance(e) {
    e.preventDefault();
    orb.classList.add('recording');
    
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }
    
    isRecording = true; audioHistory = []; recognizedText = "";
    if (recognition) { try { recognition.start(); } catch(err) {} }
    
    particleInterval = setInterval(createParticle, 100);
    loop();
}

function loop() {
    if (!isRecording) return;
    requestAnimationFrame(loop);
    analyser.getByteFrequencyData(dataArray);
    let avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;
    audioHistory.push(avg);
    
    // 多層次聲波放大
    const scaleBase = 0.5 + avg / 120;
    const opBase = 0.2 + avg / 200;
    w1.style.transform = `scale(${scaleBase})`; w1.style.opacity = opBase;
    w2.style.transform = `scale(${scaleBase * 1.15})`; w2.style.opacity = opBase * 0.7;
    w3.style.transform = `scale(${scaleBase * 1.35})`; w3.style.opacity = opBase * 0.4;
    
    uniformAmp.value = avg / 50;
}

function endResonance(e) {
    e.preventDefault();
    if (!isRecording) return;
    isRecording = false;
    orb.classList.remove('recording');
    clearInterval(particleInterval);
    
    // 重置聲波
    w1.style.transform = `scale(0.5)`; w1.style.opacity = 0;
    w2.style.transform = `scale(0.5)`; w2.style.opacity = 0;
    w3.style.transform = `scale(0.5)`; w3.style.opacity = 0;
    
    if (recognition) { try { recognition.stop(); } catch(err) {} }
    setTimeout(calculateResult, 600);
}

function calculateResult() {
    const frames = audioHistory.length;
    const avgVol = audioHistory.reduce((a,b)=>a+b,0)/frames || 0;
    const allSongs = Object.values(songDatabase).flat();
    
    let finalSong = null;
    let c1 = null, c2 = null, isSpecial = false;

    if (recognizedText.includes("mabel") || recognizedText.includes("มาเบล")) { c1 = "#ff0033"; c2 = "#8800ff"; isSpecial = true; finalSong = songDatabase["Q3"][3]; } // 修正 Mabel 對應 Heartstopper
    else if (recognizedText.includes("ingkho") || recognizedText.includes("อิงโกะ")) { c1 = "#ffff00"; c2 = "#ff66aa"; isSpecial = true; finalSong = songDatabase["Q4"][2]; }
    else if (recognizedText.includes("pimma") || recognizedText.includes("พิมมา")) { c1 = "#0088ff"; c2 = "#00ffaa"; isSpecial = true; finalSong = songDatabase["Q1"][2]; }
    else if (recognizedText.includes("pixxie") || recognizedText.includes("พิกซี่")) { isSpecial = true; }

    if (!finalSong) { finalSong = allSongs.find(s => s.keywords.some(k => recognizedText.includes(k))); }

    if (!finalSong) {
        const cats = ["Q1", "Q2", "Q3", "Q4"];
        const targetCat = cats[Math.floor(avgVol) % 4];
        const catSongs = songDatabase[targetCat];
        finalSong = catSongs[Math.floor(Math.random() * catSongs.length)];
    }

    uCol1.value.set(c1 || finalSong.col1);
    uCol2.value.set(c2 || finalSong.col2);
    document.querySelector('.song-title').innerText = finalSong.title;
    
    // 若為泰文歌名，可自動切換字型邏輯 (CSS已全域支援，這裡純示意)
    document.querySelector('.lyrics').innerText = "Matching your soul vibration...";

    const card = document.getElementById('soulCard');
    const badge = document.querySelector('.rank-badge');
    
    if (frames > 150 || isSpecial) {
        card.className = "pixxie-card rank-ss";
        badge.innerText = "SS Rank Resonance";
        badge.className = "rank-badge ss-style";
    } else {
        card.className = "pixxie-card";
        badge.innerText = "S Rank Harmony";
        badge.className = "rank-badge";
    }

    // 判斷是否為限定的三首歌，若是則加入碎閃濾鏡效果
    const holoSongs = ["ACHOO!", "Deep Talk", "Heartstopper"];
    if (holoSongs.includes(finalSong.title)) {
        card.classList.add('special-holo');
    }

    // 先顯示 result-screen，再初始化 ThreeJS，避免畫布大小為 0
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    initThreeJS();
    
    setTimeout(() => card.classList.add('revealed'), 200);
}

orb.addEventListener('mousedown', startResonance);
orb.addEventListener('mouseup', endResonance);
orb.addEventListener('touchstart', startResonance, { passive: false });
orb.addEventListener('touchend', endResonance);

const card = document.getElementById('soulCard');
const handleMove = (e) => {
    e.preventDefault();
    if (!card.classList.contains('revealed')) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const rect = card.getBoundingClientRect();
    const px = Math.min(Math.max((x - rect.left) / rect.width, 0), 1);
    const py = Math.min(Math.max((y - rect.top) / rect.height, 0), 1);
    card.style.setProperty('--rx', px); card.style.setProperty('--ry', py);
    card.style.transform = `rotateY(${(px - 0.5) * 20}deg) rotateX(${(py - 0.5) * -20}deg)`;
};
card.addEventListener('mousemove', handleMove);
card.addEventListener('touchmove', handleMove, { passive: false });

// 離開卡片時恢復原位
const resetMove = () => { card.style.transform = `rotateY(0deg) rotateX(0deg)`; };
card.addEventListener('mouseleave', resetMove);
card.addEventListener('touchend', resetMove);
</script>
</body>
