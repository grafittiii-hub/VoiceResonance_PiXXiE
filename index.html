<script>
    let player;
    function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: '',
        playerVars: { 'autoplay': 0, 'controls': 0 },
        events: {
            'onReady': onPlayerReady
        }
    });
}

function onPlayerReady(event) {
    const loader = document.getElementById('global-loader');
    const loaderContent = loader ? loader.querySelector('.loader-content') : null;
    
    if (loader && loaderContent) {
        // 1. 讓文字加上爆發發光樣式
        loaderContent.classList.add('bursting');
        
        // 2. 取得目前文字在畫面的中心點，複製你的彩蛋邏輯，來一場粒子大爆發！
        const rect = loaderContent.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        
        let burstCount = 0;
        const burstInterval = setInterval(() => {
            // 在文字中心周圍 150x60 的範圍內噴發閃粉微粒
            if (typeof spawnDust === 'function') {
                spawnDust(cx + (Math.random() - 0.5) * 150, cy + (Math.random() - 0.5) * 60, 4);
            }
            burstCount++;
            if (burstCount > 10) clearInterval(burstInterval);
        }, 40);

        // 3. 稍微延遲 150ms 後，讓整個星空背景優雅地向外推開、淡出
        setTimeout(() => {
            loader.classList.add('fade-out');
        }, 150);

        // 4. 動畫完全結束後，徹底移除 DOM
        setTimeout(() => {
            loader.remove();
        }, 1350); // 150ms 延遲 + 1200ms 的 CSS transition
    }
}

// 讓 Loading 畫面也有閃粉互動
document.getElementById('global-loader')?.addEventListener('pointermove', (e) => {
    if (Math.random() > 0.6) spawnDust(e.clientX, e.clientY, 1);
});
</script>

#global-loader {

    display: flex; flex-direction: column; align-items: center; justify-content: center;

                visibility 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    overflow: hidden; /* 防止星點超出邊界 */
}

/* 使用 ::before 和 ::after 製作兩層漂浮星點 */
#global-loader::before,
#global-loader::after {
    content: '';
    position: absolute;
    inset: -50%; 
    z-index: -1;
    pointer-events: none;
    
    /* 【核心修改】救回星星：全部改成 transparent！ */
    /* 同時隨機拿掉原本的幾顆星星，拉開坐標距離，製造出「聚散不均勻」的星空感 */
    background-image: 
        radial-gradient(1.5px 1.5px at 15px 45px, #fff, transparent),
        radial-gradient(3px 3px at 85px 140px, rgba(212, 165, 255, 0.7), transparent),
        /* 故意空出大段坐標，不放星星 */
        radial-gradient(1.5px 1.5px at 240px 90px, #fff, transparent),
        radial-gradient(2px 2px at 130px 280px, rgba(100, 200, 255, 0.6), transparent);

    background-repeat: repeat;
    background-size: 300px 300px; /* 放大重覆尺寸（原為200px），讓星星分佈得更稀疏、更有聚散聚落感 */
    animation: drift 40s linear infinite; /* 放慢漂浮速度，更顯大氣與寧靜 */
    opacity: 0.9;
}

#global-loader::after {
    /* 第二層使用不同的坐標與較大的尺寸，兩層交錯重疊後，棋盤感完全消失，形成極其自然的星空聚散 */
    background-image: 
        radial-gradient(1.5px 1.5px at 50px 120px, #fff, transparent),
        radial-gradient(3px 3px at 180px 40px, rgba(212, 165, 255, 0.5), transparent),
        radial-gradient(2px 2px at 320px 220px, #fff, transparent);
        
    background-size: 450px 450px; /* 兩層尺寸不同，永遠不會同步重疊 */
    animation: drift 55s linear infinite reverse; /* 反向、不同速慢速漂浮 */
    opacity: 0.6;
    transform: scale(1.3) rotate(25deg);
}

/* 溫和的漂浮動畫 */
@keyframes drift {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100%); }
}

#global-loader.fade-out::before {
    transform: scale(2) rotate(15deg);

}

function spawnDust(x, y, intensity = 1) {
    const amount = Math.floor(Math.random() * 3) + (intensity * 2);
    for(let i=0; i<amount; i++) {
        const dust = document.createElement('div');
        dust.className = 'fairy-dust';
        dust.style.background = dustColors[Math.floor(Math.random() * dustColors.length)];
        dust.style.left = x + 'px';
        dust.style.top = y + 'px';
        
        const angle = Math.random() * Math.PI * 2;
        const distance = (20 + Math.random() * 10) * intensity;
        dust.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
        dust.style.setProperty('--dy', `${Math.sin(angle) * distance + 30}px`); // 發光感
        dust.style.boxShadow = `0 0 12px ${dust.style.background}`;
        // 隨機旋轉與下墜時間
        dust.style.animation = `dustFall ${0.8 + Math.random() * 1.0}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;

        dust.style.animation = `dustFall ${0.6 + Math.random() * 0.6}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
        document.body.appendChild(dust);
        setTimeout(() => dust.remove(), 1500);
    }
}

// 檢查歌詞匹配度
function getLyricsMatchScore(transcript, keywords) {
    if (!keywords || keywords.length === 0) return 0;
    
    let matchCount = 0;
    keywords.forEach(keyword => {
        // 確保關鍵字轉小寫比對
        if (transcript.includes(keyword.toLowerCase())) {
            matchCount++;
        }
    });
    return matchCount; // 回傳匹配到的數量
}

let scene, camera, renderer, material;
let uniformAmp = { value: 0.0 }, uCol1 = { value: new THREE.Color() }, uCol2 = { value: new THREE.Color() };
let threeInitialized = false;

function initThreeJS() {
    if (threeInitialized) return;
    const container = document.getElementById('webgl-container');
    const w = container.clientWidth || 300; 
    const h = container.clientHeight || 520;
    scene = new THREE.Scene();
    
    // 長寬比改為動態比例
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    camera.position.z = 2.8;
    
// ===== 尋找 initThreeJS 內部並替換這段 WebGL 初始化 =====
    renderer = new THREE.WebGLRenderer({ 
        alpha: true, 
        antialias: true,
        preserveDrawingBuffer: true
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);
    
    const geo = new THREE.SphereGeometry(0.82, 128, 128);
    const colorBright = new THREE.Color('#fbedfc');
    const colorShadow = new THREE.Color('#c57acf');

    material = new THREE.ShaderMaterial({
        transparent: true,
        uniforms: { 
            uTime: { value: 0 }, 
            uRatio: { value: 0.3 },
            uAmp: uniformAmp, 
            colBright: { value: colorBright }, 
            colShadow: { value: colorShadow } 
        },
        vertexShader: `
            uniform float uTime; uniform float uAmp; varying vec3 vNormal; varying float vDisplacement;
            void main() { 
                vNormal = normal;
                float noise = sin(position.x * 2.0 + uTime) * cos(position.y * 2.0 + uTime) * sin(position.z * 2.0 + uTime);
                noise += 0.5 * sin(position.x * 4.0 - uTime * 1.5);
                float displacement = noise * uAmp * 0.45;
                vDisplacement = displacement;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position + normal * displacement, 1.0); 
            }`,
        fragmentShader: `
            uniform vec3 colBright; uniform vec3 colShadow; uniform float uRatio; varying vec3 vNormal; varying float vDisplacement;
            void main() { 
                float fresnel = pow(1.0 - max(dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0), 2.5);
                float factor = vNormal.y * 0.5 + (1.0 - uRatio) + vDisplacement;
                vec3 baseCol = mix(colShadow, colBright, vNormal.y * 0.5 + 0.8 + vDisplacement);
                vec3 finalCol = baseCol + (fresnel * 0.3 * colBright); 
                gl_FragColor = vec4(finalCol, 0.95); 
            }`
    });

    scene.add(new THREE.Mesh(geo, material));

const anim = () => {
    requestAnimationFrame(anim);
    
    // 只有當結果頁面 active 時才進行渲染
    if (document.getElementById('result-screen').classList.contains('active')) {
        material.uniforms.uTime.value += 0.012;
        
        // 【核心修正：本機測試/無音訊防護機制】
        // 如果在 C Drive 或是沒錄到音（uAmp 為 0），我們給予一個夢幻的波動底值，使其不會只是死板的圓形
        if (!material.uniforms.uAmp.value || material.uniforms.uAmp.value < 0.01) {
            // 結合時間的正弦波，讓晶體自主產生不規則的多邊形優雅起伏
            material.uniforms.uAmp.value = 0.15 + Math.sin(material.uniforms.uTime.value * 2.0) * 0.1;
        }

        renderer.render(scene, camera);
    }
};
anim();
    threeInitialized = true;
}

async function startResonance(e) {
if (e && e.preventDefault) e.preventDefault();
    
    // 【電腦版修復核心】：鎖定指標，防止滑鼠微小移動或拖曳導致判定離開
    if (e && e.pointerId && typeof orbBtn.setPointerCapture === 'function') {
        orbBtn.setPointerCapture(e.pointerId);
    }

    orbBtn.classList.add('recording');
    
    const rect = orbBtn.getBoundingClientRect();
    if (typeof spawnDust === 'function') spawnDust(rect.left + rect.width/2, rect.top + rect.height/2, 4);

    // 【權限鎖邏輯】：只有未獲取權限，或是 audioCtx 丟失時才執行 getUserMedia
    if (!hasMicrophonePermission || !audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 權限獲取成功，上鎖！
            hasMicrophonePermission = true;

            waves.forEach(w => {
                if (w) w.classList.add('active');
            });
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (err) { 
            const alertMsg = document.getElementById('alert-msg');
            const customAlert = document.getElementById('custom-alert');
            if (alertMsg) alertMsg.innerText = "Please allow microphone access to resonate with PiXXiE.";
            if (customAlert) customAlert.classList.remove('hidden');
            orbBtn.classList.remove('recording');

            waves.forEach(w => {
                if (w) w.classList.remove('active');
            });
            return; 
        }
    } else {
        // 如果音訊已存在且授權過（非首次點擊），直接亮起波紋
        waves.forEach(w => {
            if (w) w.classList.add('active');
        });
    }

    // 強制喚醒被瀏覽器阻擋的 AudioContext
    if (audioCtx && audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    isRecording = true; 
    audioHistory = []; 
    recognizedText = "";
    if (recognition) { try { recognition.start(); } catch(err) {} }
    
    // 避免重複設定 interval 導致粒子暴增
    if (typeof particleInterval !== 'undefined') clearInterval(particleInterval);
    particleInterval = setInterval(createParticle, 100);
    
    loop();
}

function drawHoloEffect(ctx, x, y, width, height) {
    ctx.save();

    patternCanvas.height = 120;
    const pCtx = patternCanvas.getContext('2d');

    // --- 繪製三個 Conic Gradients ---
    // 1. 白色層
    let grad1 = pCtx.createConicGradient(0, 60, 60);
    grad1.addColorStop(0, "rgba(255,255,255,0.12)");
    grad1.addColorStop(60/360, "transparent");
    pCtx.fillStyle = grad1;
    pCtx.fillRect(0, 0, 120, 120);

    // 2. 紫色層 (偏移 120deg)
    let grad2 = pCtx.createConicGradient((120 * Math.PI) / 180, 36, 48); // 30% 40% -> x=36, y=48
    grad2.addColorStop(0, "rgba(212,165,255,0.2)");
    grad2.addColorStop(80/360, "transparent");
    pCtx.fillStyle = grad2;
    pCtx.fillRect(0, 0, 120, 120);

    // 3. 藍色層 (偏移 240deg)
    let grad3 = pCtx.createConicGradient((240 * Math.PI) / 180, 84, 72); // 70% 60% -> x=84, y=72
    grad3.addColorStop(0, "rgba(68,227,255,0.15)");
    grad3.addColorStop(100/360, "transparent");
    pCtx.fillStyle = grad3;
    pCtx.fillRect(0, 0, 120, 120);

    // 建立 pattern 並填滿
    const pattern = ctx.createPattern(patternCanvas, 'repeat');
    ctx.fillStyle = pattern;
    
    // 繪製到主畫布上 (覆蓋整個卡片範圍)
    ctx.fillRect(x, y, width, height);
    
    ctx.restore();

        }
    }

    // Step 3: 在遮罩完全不透明時 (500ms ~ 800ms 間) 切換面板與觸發 WebGL 渲染
    setTimeout(() => {
        console.log("遮罩半透明點：開始隱藏主頁，切換結果頁樣式...");

        // 1. 隱藏主頁面
        if (intro) intro.style.display = 'none';
        
        // 2. 顯示結果頁 (精準排版時序控管)
        if (result) {
            result.style.display = 'flex';   // 先改為 flex
            result.classList.remove('active'); // 確保起點是透明無動畫狀態
            
            void result.offsetHeight;         // 強制重繪 (Reflow)，讓瀏覽器捕捉到 display 的轉變
            
            result.classList.add('active');    // 掛載 active 類，觸發完美的 CSS Opacity 與 Blur 漸變
            result.setAttribute('aria-hidden', 'false');
            console.log("嘗試顯示結果面板... 成功掛載 active 動態類");
        }

        // 3. 撤退遮罩面罩
        if (overlay) {
            overlay.style.opacity = "0";
            setTimeout(() => { 
                overlay.style.visibility = "hidden"; 
                overlay.style.pointerEvents = "none";
            }, 500);
        }

        // 4. 觸發 3D 渲染與卡片翻轉
        if (typeof initThreeJS === 'function') {
            initThreeJS();
        }

        // 根據 Rank 動態變更 WebGL Orb 顏色
        if (material && material.uniforms) {
            if (finalRank === "A" || finalRank === "SS") {
                if (finalSong.col2) material.uniforms.colBright.value.set(finalSong.col2);
                if (finalSong.col1) material.uniforms.colShadow.value.set(finalSong.col1);
                material.uniforms.uRatio.value = 0.7;
            } else {
                material.uniforms.colBright.value.set('#f8e8fa');
                material.uniforms.colShadow.value.set('#f5cdfa');
                material.uniforms.uRatio.value = 0.5;
            }
        }

        // 最後讓壓克力卡片以優雅的翻轉動畫浮現
        setTimeout(() => {
            if (card) card.classList.add('revealed');
        }, 200);

    }, 600); // 調整為 600ms，在 0.8s 遮罩淡入的中後段完成偷偷切換，視覺最平滑
}

/**
 * Result View Testing Component Modifier
 * Dynamic runtime layout engine updates parameters specifically for layout checking and exporter tests.
 */
function swapCurrentResult(targetRank) {
    console.log(`[QA Switcher] Real-time engine conversion to: ${targetRank.toUpperCase()}`);
    
    const card = document.querySelector('.pixxie-card');
    if (!card) return;
    
    // Explicitly update global runtime variables so your download engine outputs the right data file
    window.finalRank = targetRank.toUpperCase(); 
    
    // Clear structural layout definitions
    card.classList.remove('rank-a', 'rank-s', 'rank-ss', 'rank-sss');
    
    const badge = card.querySelector('.rank-badge');
    const songTitle = card.querySelector('.song-title');
    const lyricBox = card.querySelector('.lyrics');
    
    if (targetRank === 'ss') {
        card.classList.add('rank-ss');
        card.style.setProperty('--bg-g1', '#ff75c3');
        card.style.setProperty('--bg-g2', '#a18cd1');
        
        if (badge) {
            badge.className = 'rank-badge ss-style';
            badge.textContent = 'Rank SS';
        }
        if (songTitle) songTitle.textContent = 'DEEP TALK (SS Remaster)';
        if (lyricBox) lyricBox.innerHTML = 'ลองคิดดูไหม ถ้าเรื่องวันนั้นเราไม่ได้พูดคุยกัน...<br>Soul Alignment Level: 94%';
        
        // Match WebGL shader uniforms configuration
        if (typeof material !== 'undefined' && material.uniforms) {
            material.uniforms.colBright.value.set('#ff75c3');
            material.uniforms.colShadow.value.set('#a18cd1');
            material.uniforms.uRatio.value = 0.7;
        }
        
    } else if (targetRank === 'sss') {
        card.classList.add('rank-sss');
        card.style.setProperty('--bg-g1', '#b868e3');
        card.style.setProperty('--bg-g2', '#e36868');
        
        if (badge) {
            badge.className = 'rank-badge sss-style';
            badge.textContent = 'Rank SSS';
        }
        if (songTitle) songTitle.textContent = 'ACHOO! (Absolute Ultimate)';
        if (lyricBox) lyricBox.innerHTML = 'Achoo! ให้เธอรู้ว่ามีใครสั่นไหวหัวใจ...<br>Soul Alignment Level: 99% Absolute Perfection';
        
        if (typeof material !== 'undefined' && material.uniforms) {
            material.uniforms.colBright.value.set('#f8e8fa');
            material.uniforms.colShadow.value.set('#f5cdfa');
            material.uniforms.uRatio.value = 0.5;
        }
    }
    
    // Re-trigger card entrance animation sequence to apply full visual updates
    card.classList.remove('revealed');
    setTimeout(() => {
        card.classList.add('revealed');
    }, 100);
}
